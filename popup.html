<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盯盘助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div class="hero-top">
          <div class="title-mode-switch" id="mode-switch">
            <button class="title-mode-btn active" data-mode="watch" id="watch-mode-btn">盯盘助手</button>
            <button class="title-mode-btn title-mode-pray" data-mode="pray">
              <span id="pray-mode-label">财神保佑</span>
              <span class="title-mode-badge" id="pray-mode-badge">旺</span>
            </button>
          </div>
          <div class="hero-actions">
            <button id="info-btn" class="icon-btn" title="作者信息" aria-label="作者信息">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                <path d="M12 10.2v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                <circle cx="12" cy="7.4" r="1.1" fill="currentColor"></circle>
              </svg>
            </button>
            <button id="refresh-btn" class="icon-btn" title="手动刷新" aria-label="手动刷新">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 8a7 7 0 1 0 1.4 6.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                <path d="M19 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="hero-meta">
          <p class="sub" id="hero-sub">实时行情 · 价格提醒 · 浏览器通知</p>
          <div class="timestamp"><span id="timestamp-label">上次：</span><span id="last-updated">--</span></div>
        </div>
      </header>

      <section class="card indexes-card" id="indexes-card">
        <div class="indexes" id="indexes"></div>
      </section>

      <section class="card search-card">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input id="search-input" type="text" placeholder="输入股票代码或名称搜索" />
          <button id="search-clear-btn" class="search-clear hidden" type="button" title="清空搜索">×</button>
        </div>
        <div id="search-results" class="list"></div>
      </section>

      <section class="card watch-card" id="watch-card">
        <div class="section-title-row">
          <div class="section-title" id="watch-section-title">我的关注</div>
          <div class="count"><span id="watch-count-prefix">已关注</span> <span id="stock-count">0</span> <span id="watch-count-suffix">只</span></div>
        </div>
        <div id="watchlist"></div>
      </section>

      <section class="card pray-card hidden" id="pray-card">
        <div class="altar-card">
          <div class="altar-stage">
            <div class="deity-name" id="deity-name">财神爷</div>
            <div class="deity-display">
              <button class="deity-arrow deity-arrow-left" id="deity-prev" aria-label="上一个神位">‹</button>
              <div class="deity-image-wrap">
              <video
                id="deity-video"
                class="deity-video"
                playsinline
                preload="auto"
                muted
              ></video>
              </div>
              <button class="deity-arrow deity-arrow-right" id="deity-next" aria-label="下一个神位">›</button>
            </div>
            <div class="altar-copy altar-copy-centered" id="deity-copy">愿今日红红火火，账户长虹。</div>
            <div class="altar-fruits-row" id="altar-fruits-row">
              <button class="altar-slot" data-slot-index="0">+</button>
              <button class="altar-slot" data-slot-index="1">+</button>
              <button class="altar-slot" data-slot-index="2">+</button>
            </div>
            <div class="pray-search-overlay hidden" id="pray-search-overlay">
              <div class="pray-search-panel">
                <div class="pray-search-head">
                  <div class="pray-search-title" id="pray-search-title">搜索股票上供</div>
                  <button class="pray-search-close" id="close-pray-search" title="关闭">×</button>
                </div>
                <div class="pray-search-box">
                  <span class="search-icon">🔍</span>
                  <input id="pray-search-input" type="text" placeholder="输入股票代码或名称" />
                </div>
                <div class="pray-search-results" id="pray-search-results"></div>
              </div>
            </div>
            <button id="incense-btn" class="incense-btn incense-btn-floating">上香</button>
            <img class="altar-burner-image" src="assets/incense-burner.png" alt="香炉" />
            <div class="incense-actions">
              <div class="incense-meta"><span id="incense-count-label">累计香火：</span><span id="incense-count">0</span> <span id="incense-count-unit">次</span></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div id="status"></div>

    <div class="modal hidden" id="qr-modal">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-panel">
        <button class="modal-close" id="close-qr-modal" title="关闭">×</button>
        <div class="modal-title" id="qr-modal-title">供位已满</div>
        <div class="modal-copy" id="qr-modal-copy">当前最多只能上供三只股票。想继续加票，欢迎扫码联系作者交流。</div>
        <img class="qr-image" id="qr-modal-image" src="assets/developer-qr.png" alt="作者微信二维码" />
        <div class="modal-footnote" id="qr-modal-footnote">扫码备注来意，我会尽快回复。</div>
      </div>
    </div>

    <div class="modal hidden" id="info-modal">
      <div class="modal-backdrop" data-close-info-modal="true"></div>
      <div class="modal-panel info-modal-panel">
        <button class="modal-close" id="close-info-modal" title="关闭">×</button>
        <div class="settings-card">
          <div class="settings-title" id="settings-title">系统设置</div>
          <div class="settings-row">
            <label class="settings-label" for="language-select" id="language-label">语言</label>
            <select id="language-select" class="settings-select">
              <option value="system">跟随系统</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
        <div class="modal-title" id="info-modal-title">联系开发者</div>
        <div class="modal-copy info-contact" id="info-contact">Zhang Xumeng / TEL:18612033945（同微信）</div>
        <div class="info-grid">
          <div class="info-card">
            <div class="info-card-title" id="developer-card-title">微信联系</div>
            <img class="qr-image" id="developer-qr-image" src="assets/developer-qr.png" alt="微信二维码" />
            <div class="info-card-copy" id="developer-card-copy">加我反馈问题或提出建议</div>
          </div>
          <div class="info-card">
            <div class="info-card-title" id="support-card-title">支持一下</div>
            <img class="qr-image" id="support-qr-image" src="assets/alipay.png" alt="收款码" />
            <div class="info-card-copy" id="support-card-copy">欢迎金主请我喝杯咖啡</div>
          </div>
        </div>
        <div class="review-strip">
          <div class="review-copy">
            <div class="review-title" id="review-title">喜欢这个插件？</div>
            <div class="review-stars" aria-hidden="true">★★★★★</div>
          </div>
          <button id="review-btn" class="review-btn">去给个 5 星</button>
        </div>
        <div class="modal-footnote" id="info-modal-footnote">感谢支持，祝你自选常红、账户长虹。</div>
      </div>
    </div>

    <div class="modal hidden" id="detail-modal">
      <div class="modal-backdrop" data-close-detail-modal="true"></div>
      <div class="modal-panel detail-modal-panel">
        <button class="modal-close" id="close-detail-modal" title="关闭">×</button>
        <div id="detail-body"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
