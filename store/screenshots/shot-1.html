<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盯盘助手截图 1</title>
    <style>
      body { margin: 0; font-family: "PingFang SC", Arial, sans-serif; background: #eef3ff; }
      .frame { width: 1280px; height: 800px; padding: 36px; box-sizing: border-box; background: linear-gradient(160deg, #eef4ff, #f8fbff); }
      .shell { height: 100%; border-radius: 28px; background: rgba(255,255,255,0.92); box-shadow: 0 20px 60px rgba(37,99,235,.12); padding: 28px; }
      .title { font-size: 40px; font-weight: 700; color: #0f172a; }
      .sub { margin-top: 8px; color: #64748b; font-size: 22px; }
      .row { display: flex; gap: 18px; margin-top: 28px; }
      .index { flex: 1; background: #f8fbff; border: 1px solid #dbeafe; border-radius: 24px; padding: 28px; text-align: center; }
      .index .n { font-size: 28px; color: #1e293b; margin-bottom: 18px; }
      .index .p { font-size: 48px; color: #dc2626; font-weight: 700; }
      .index .c { font-size: 26px; color: #16a34a; margin-top: 6px; }
      .search { margin-top: 24px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 24px; padding: 22px 26px; color: #94a3b8; font-size: 28px; }
      .card { margin-top: 26px; border: 1px solid #e5e7eb; border-radius: 24px; padding: 24px; }
      .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
      .name { font-size: 34px; font-weight: 700; color: #0f172a; }
      .meta { margin-top: 10px; font-size: 22px; color: #94a3b8; display: flex; gap: 10px; align-items: center; }
      .badge { background: #eef2f7; color: #64748b; padding: 4px 10px; border-radius: 999px; font-size: 16px; }
      .quote { text-align: right; }
      .quote .p { font-size: 48px; font-weight: 700; color: #dc2626; }
      .quote .c { font-size: 28px; color: #16a34a; }
      .tags { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
      .tag { display: inline-flex; gap: 8px; align-items: center; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 999px; padding: 10px 16px; color: #4b5563; font-size: 22px; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="shell">
        <div class="title">盯盘助手</div>
        <div class="sub">查看指数、搜索股票、设置目标价提醒</div>
        <div class="row">
          <div class="index"><div class="n">上证指数</div><div class="p">3828.80</div><div class="c">-3.24%</div></div>
          <div class="index"><div class="n">深证成指</div><div class="p">13427.92</div><div class="c">-3.16%</div></div>
          <div class="index"><div class="n">创业板指</div><div class="p">3253.74</div><div class="c">-2.93%</div></div>
        </div>
        <div class="search">搜索股票代码或名称</div>
        <div class="card">
          <div class="card-top">
            <div>
              <div class="name">腾讯控股</div>
              <div class="meta"><span class="badge">HK</span><span>00700</span></div>
            </div>
            <div class="quote"><div class="p">497.80</div><div class="c">-2.61%</div></div>
          </div>
          <div class="tags">
            <div class="tag">🔔 500.00</div>
            <div class="tag">🔔 520.00</div>
            <div class="tag">🔔 530.00</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
