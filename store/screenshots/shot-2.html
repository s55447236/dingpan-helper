<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>盯盘助手截图 2</title>
    <style>
      body { margin: 0; font-family: "PingFang SC", Arial, sans-serif; background: #f3f7ff; }
      .frame { width: 1280px; height: 800px; padding: 40px; box-sizing: border-box; background: linear-gradient(180deg,#eff6ff,#ffffff); }
      .shell { height: 100%; border-radius: 30px; background: white; box-shadow: 0 18px 60px rgba(15,23,42,.1); padding: 36px; }
      .hero { display: flex; justify-content: space-between; }
      .title { font-size: 42px; font-weight: 700; color: #0f172a; }
      .desc { color: #64748b; font-size: 22px; margin-top: 10px; width: 620px; line-height: 1.7; }
      .notice { margin-top: 40px; border-radius: 26px; background: linear-gradient(135deg,#eff6ff,#dbeafe); padding: 28px; display: flex; align-items: center; justify-content: space-between; }
      .notice .left { font-size: 34px; color: #1d4ed8; font-weight: 700; }
      .notice .right { font-size: 28px; color: #0f172a; }
      .list { margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .item { border: 1px solid #e5e7eb; border-radius: 22px; padding: 22px; }
      .name { font-size: 30px; font-weight: 700; color: #0f172a; }
      .meta { margin-top: 8px; font-size: 20px; color: #94a3b8; display: flex; gap: 8px; align-items: center; }
      .badge { background: #eef2f7; color: #64748b; padding: 4px 10px; border-radius: 999px; font-size: 14px; }
      .tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
      .tag { padding: 8px 14px; border-radius: 999px; font-size: 20px; border: 1px solid #e5e7eb; background: #f3f4f6; color: #4b5563; }
      .tag.hit { background: #ede9fe; border-color: #c4b5fd; color: #6d28d9; }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="shell">
        <div class="hero">
          <div>
            <div class="title">多个目标价提醒</div>
            <div class="desc">为单只股票设置多个目标价。价格到达或穿过目标价时，发送浏览器通知并在扩展图标显示角标提醒。</div>
          </div>
        </div>
        <div class="notice">
          <div class="left">🔔 腾讯控股 价格已到目标价</div>
          <div class="right">现价 500.00，目标价 500.00</div>
        </div>
        <div class="list">
          <div class="item">
            <div class="name">腾讯控股</div>
            <div class="meta"><span class="badge">HK</span><span>00700</span></div>
            <div class="tags"><div class="tag hit">🔔 500.00</div><div class="tag">🔔 520.00</div></div>
          </div>
          <div class="item">
            <div class="name">贵州茅台</div>
            <div class="meta"><span class="badge">SH</span><span>600519</span></div>
            <div class="tags"><div class="tag">🔔 1400.00</div><div class="tag">🔔 1450.00</div></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
